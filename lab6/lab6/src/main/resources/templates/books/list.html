<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Book List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container">
    <h1 class="my-4">Book List</h1>
    <div th:if="${warning}" class="alert alert-warning" th:text="${warning}"></div>
    <div class="d-flex justify-content-between mb-3">
        <form th:action="@{/books/search}" method="get" class="d-flex">
            <label class="visually-hidden" for="keyword">Search</label>
            <input id="keyword" type="text" name="keyword" class="form-control me-2" placeholder="Search by title or author"/>
            <button type="submit" class="btn btn-outline-primary">Search</button>
        </form>
        <form id="filterForm" th:action="@{/books/filter}" method="get" class="d-flex">
            <label class="visually-hidden" for="categoryId">Category</label>
            <select id="categoryId" name="categoryId" class="form-select me-2">
                <option value="">-- Select Category --</option>
                <option th:each="category : ${categories}"
                        th:value="${category.id}"
                        th:text="${category.name}"></option>
            </select>
            <button type="submit" class="btn btn-outline-secondary">Filter</button>
            <a href="/books" class="btn btn-outline-danger ms-2">Clear</a>
        </form>
    </div>
    <div class="d-flex justify-content-between mb-3">
        <a href="/books/add" class="btn btn-primary">Add Book</a>
        <a href="/categories" class="btn btn-info">Manage Categories</a>
    </div>
    <table class="table table-striped table-bordered">
        <thead class="table-dark">
        <tr>
            <th>Title</th>
            <th>Author</th>
            <th>Price</th>
            <th>Published Year</th>
            <th>Category</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="book : ${books}">
            <td th:text="${book.title}"></td>
            <td th:text="${book.author}"></td>
            <td th:text="${book.price}"></td>
            <td th:text="${book.published_year}"></td>
            <td th:text="${book.category.name}"></td>
            <td>
                <a th:href="@{/books/edit/{id}(id=${book.id})}" class="btn btn-sm btn-success">Edit</a>
                <!-- use data-name and btn-delete class; JS will handle confirmation -->
                <a th:href="@{/books/delete/{id}(id=${book.id})}"
                   class="btn btn-sm btn-danger btn-delete"
                   th:attr="data-name=${book.title}">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<!-- global delete confirmation handler and filter validation -->
<script>
    document.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('.btn-delete').forEach(function (el) {
            el.addEventListener('click', function (e) {
                var name = el.getAttribute('data-name') || 'this item';
                if (!confirm('Are you sure you want to delete: ' + name + '?')) {
                    e.preventDefault();
                }
            });
        });

        var filterForm = document.getElementById('filterForm');
        if (filterForm) {
            filterForm.addEventListener('submit', function (e) {
                var sel = document.getElementById('categoryId');
                if (!sel || !sel.value) {
                    e.preventDefault();
                    alert('Please select a category to filter.');
                }
            });
        }
    });
</script>
</body>
</html>
