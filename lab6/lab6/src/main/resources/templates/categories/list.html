<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Category List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container">
    <h1 class="my-4">Category Management</h1>

    <!-- Add Category Form -->
    <div class="card mb-4">
        <div class="card-header">
            Add New Category
        </div>
        <div class="card-body">
            <form th:action="@{/categories/add}" method="post" class="d-flex">
                <label class="visually-hidden" for="categoryName">New Category</label>
                <input id="categoryName" type="text" name="name" class="form-control me-2"
                       placeholder="Enter new category name" required>
                <button type="submit" class="btn btn-primary">Add</button>
            </form>
        </div>
    </div>

    <table class="table table-striped table-bordered">
        <thead class="table-dark">
        <tr>
            <th>Category Name</th>
            <th>Number of Books</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="category : ${categories}">
            <td th:text="${category.name}"></td>
            <td th:text="${category.books != null ? category.books.size() : 0}"></td>
            <td>
                <a th:if="${category.books == null or category.books.isEmpty()}"
                   th:href="@{/categories/delete/{id}(id=${category.id})}"
                   class="btn btn-sm btn-danger btn-delete"
                   th:attr="data-name=${category.name}">Delete</a>
                <span th:unless="${category.books == null or category.books.isEmpty()}"
                      class="text-muted">Cannot delete</span>
            </td>
        </tr>
        </tbody>
    </table>
    <a href="/books" class="btn btn-secondary">Back to Book List</a>
</div>

<!-- global delete confirmation handler -->
<script>
    document.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('.btn-delete').forEach(function (el) {
            el.addEventListener('click', function (e) {
                var name = el.getAttribute('data-name') || 'this item';
                if (!confirm('Are you sure you want to delete: ' + name + '?')) {
                    e.preventDefault();
                }
            });
        });
    });
</script>
</body>
</html>
